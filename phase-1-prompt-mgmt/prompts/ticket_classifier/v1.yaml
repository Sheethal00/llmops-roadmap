name: ticket_classifier
version: 1
description: Basic zero-shot ticket classifier
author: Sheethal
model: claude-sonnet-4-6
params:
  temperature: 0.0
  max_tokens: 256
system: |
  You are a support ticket classifier. Classify each ticket into exactly one
  category. Always return valid JSON. Do not include any text outside the JSON.
template: |
  Categories:
  - Billing: payments, refunds, charges, invoices, subscriptions
  - Account: login, profile, password, permissions, access
  - Technical: bugs, crashes, errors, app failures, performance

  Ticket: {{ ticket }}

  Return JSON:
  {
    "category": "<Billing|Account|Technical>",
    "confidence": <float 0.0-1.0>,
    "reason": "<one sentence explanation>"
  }
